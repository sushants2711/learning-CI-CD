name: Deploy Frontend on Amazon AWS S3 + CDN

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yaml"

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT CODE ──────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. SETUP NODE.JS ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── 3. INSTALL DEPENDENCIES ───────────────────────────────────────────────
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      # ── 4. BUILD FRONTEND ─────────────────────────────────────────────────────
      - name: Build Frontend
        working-directory: ./frontend
        env:
          # Inject your frontend env vars here (Vite / CRA / Next etc.)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}          # Vite example
          # REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}  # CRA example
        run: npm run build

      # ── 5. CONFIGURE AWS CREDENTIALS ─────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 6. SYNC BUILD FOLDER TO S3 ───────────────────────────────────────────
      - name: Deploy to S3
        run: |
          aws s3 sync ./frontend/dist s3://${{ secrets.AWS_S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          # HTML files should NOT be cached so users always get latest version
          aws s3 cp ./frontend/dist/index.html \
            s3://${{ secrets.AWS_S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # ── 7. INVALIDATE CLOUDFRONT CDN CACHE ───────────────────────────────────
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # ── 8. PRINT LIVE URL ─────────────────────────────────────────────────────
      - name: Print Live URL
        run: |
          echo "✅ Frontend deployed successfully!"
          echo "🌍 Live URL: https://${{ secrets.AWS_CLOUDFRONT_DOMAIN }}"